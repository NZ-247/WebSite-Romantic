<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin Romântico</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-heart.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <p class="login-eyebrow">Área protegida</p>
        <h1>Painel de Edição</h1>
        <p>Informe o token do servidor para abrir o cantinho de administração.</p>

        <form id="login-form" class="login-form">
          <label>
            Token de acesso
            <input id="admin-token" type="password" autocomplete="current-password" required autofocus />
          </label>
          <p id="login-message" class="form-message" role="status"></p>
          <button class="primary-btn" type="submit">Entrar</button>
          <a class="ghost-btn" href="/">Voltar ao site</a>
        </form>
      </section>
    </main>

    <script src="/js/login.js" type="module"></script>
  </body>
</html>
